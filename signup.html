<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회원가입 · Ideabl</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1A1A1A;--ink-mid:#555552;--ink-light:#8A8880;
  --paper:#FAFAF8;--paper-2:#F3F1EB;--rule:#E0DDD5;--rule-dark:#C8C5BC;
  --green:#1D7A5F;--green-lt:#E4F0EC;--red:#B91C1C;--red-lt:#FEF2F2;
  --serif:'Noto Serif KR',serif;--sans:'Noto Sans KR',sans-serif;
}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);min-height:100vh;display:flex;flex-direction:column}
nav{border-bottom:1px solid var(--rule);padding:0 48px;height:60px;display:flex;align-items:center}
.nav-logo{font-family:var(--serif);font-weight:700;font-size:17px;color:var(--ink);text-decoration:none}
.nav-logo span{color:var(--ink-light);font-weight:300;font-size:14px}
.page-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:60px 24px}
.card{width:100%;max-width:460px;background:white;border:1px solid var(--rule);border-radius:8px;padding:48px 44px}
.eyebrow{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.eyebrow-line{width:20px;height:1px;background:var(--ink-light)}
.eyebrow span{font-size:10px;color:var(--ink-light);letter-spacing:.2em}
h1{font-family:var(--serif);font-weight:700;font-size:26px;color:var(--ink);letter-spacing:-.02em;margin-bottom:28px}

/* 메시지 박스 */
#msg{display:none;padding:11px 14px;border-radius:4px;font-size:13px;margin-bottom:16px;line-height:1.65}

/* 필드 */
.f{margin-bottom:18px}
.f>label{display:block;font-size:12px;color:var(--ink-mid);letter-spacing:.06em;margin-bottom:7px}
.req{color:var(--red)}
input[type=text],input[type=email],input[type=password],select{
  width:100%;height:44px;padding:0 14px;
  border:1px solid var(--rule-dark);border-radius:4px;
  font-family:var(--sans);font-size:14px;color:var(--ink);
  background:var(--paper);outline:none;transition:border-color .2s;
  -webkit-appearance:none;appearance:none;
}
input:focus,select:focus{border-color:var(--ink)}
input::placeholder{color:var(--ink-light)}
input:disabled{background:var(--paper-2);color:var(--ink-light)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.row2 .f{margin-bottom:0}

/* 이메일 + 버튼 */
.email-row{display:flex;gap:8px}
.email-row input{flex:1;min-width:0}
#btnSend{
  height:44px;padding:0 14px;flex-shrink:0;white-space:nowrap;
  font-family:var(--sans);font-size:12px;border-radius:4px;
  background:var(--paper-2);color:var(--ink-light);
  border:1px solid var(--rule-dark);cursor:pointer;transition:all .2s;
}

/* 코드 박스 — 처음엔 숨김 */
#codeBox{
  display:none;
  margin-top:10px;padding:16px;
  background:#F0F7FF;border:1px solid #BFDBFE;border-radius:6px;
}
#codeBox p{font-size:12px;color:#1D4ED8;margin-bottom:10px;line-height:1.6}
.code-row{display:flex;gap:8px}
#codeIn{
  flex:1;height:48px;padding:0 12px;
  border:2px solid var(--ink);border-radius:4px;
  font-family:var(--sans);font-size:22px;font-weight:700;
  letter-spacing:.3em;text-align:center;color:var(--ink);
  background:white;outline:none;
}
#codeIn::placeholder{font-size:13px;font-weight:400;letter-spacing:0;color:var(--ink-light)}
#btnCheck{
  height:48px;padding:0 16px;flex-shrink:0;
  background:var(--green);color:white;border:none;
  border-radius:4px;font-family:var(--sans);font-size:13px;cursor:pointer;
}
#btnCheck:hover{background:#155e4a}
#timerText{
  display:block;margin-top:8px;
  font-size:13px;font-weight:600;color:var(--red);
}

/* 인증완료 배지 */
#verifiedBadge{
  display:none;align-items:center;gap:6px;
  margin-top:8px;padding:8px 12px;
  background:var(--green-lt);border:1px solid #6ee7b7;
  border-radius:4px;font-size:13px;color:var(--green);font-weight:500;
}

/* 약관 */
.agree-box{border:1px solid var(--rule);border-radius:6px;overflow:hidden;margin-bottom:20px}
.a-row{
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;border-bottom:1px solid var(--rule);
  cursor:pointer;user-select:none;transition:background .1s;
}
.a-row:last-child{border-bottom:none}
.a-row:hover{background:var(--paper-2)}
.a-row.all-row{background:var(--paper-2)}
.a-row.all-row span{font-size:13px;font-weight:600;color:var(--ink)}
.a-row span{font-size:13px;color:var(--ink-mid)}
input[type=checkbox]{width:17px;height:17px;flex-shrink:0;accent-color:var(--ink);cursor:pointer;pointer-events:none}
.br{font-size:10px;color:var(--red);background:var(--red-lt);padding:1px 6px;border-radius:2px;margin-right:4px}
.bo{font-size:10px;color:var(--ink-light);background:white;border:1px solid var(--rule);padding:1px 6px;border-radius:2px;margin-right:4px}

#btnGo{
  width:100%;height:50px;background:var(--ink);color:white;
  border:none;border-radius:4px;font-family:var(--sans);
  font-size:14px;letter-spacing:.06em;cursor:pointer;margin-top:4px;
}
#btnGo:hover{background:#333}
.foot{text-align:center;margin-top:20px;padding-top:18px;border-top:1px solid var(--rule);font-size:13px;color:var(--ink-light)}
.foot a{color:var(--ink);font-weight:500;text-decoration:none}
</style>
</head>
<body>
<nav><a href="index.html" class="nav-logo">Ideabl <span>· 아이디어블</span></a></nav>
<div class="page-wrap">
<div class="card">
  <div class="eyebrow"><div class="eyebrow-line"></div><span>SIGN UP</span></div>
  <h1>회원가입</h1>
  <div id="msg"></div>

  <div class="f">
    <label>이름 (활동명) <span class="req">*</span></label>
    <input type="text" id="name" placeholder="실명 또는 활동명">
  </div>

  <div class="f">
    <label>이메일 <span class="req">*</span></label>
    <div class="email-row">
      <input type="email" id="email" placeholder="example@email.com">
      <button id="btnSend">인증코드 발송</button>
    </div>
    <!-- 코드 입력 박스 (발송 후 표시) -->
    <div id="codeBox">
      <p>📧 <strong>인증코드 8자리</strong>를 이메일로 발송했습니다.<br>아래 칸에 입력 후 확인 버튼을 눌러주세요.</p>
      <div class="code-row">
        <input type="text" id="codeIn" placeholder="00000000" maxlength="8" inputmode="numeric">
        <button id="btnCheck">확인</button>
      </div>
      <span id="timerText"></span>
    </div>
    <div id="verifiedBadge">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="6.5" stroke="#1D7A5F" stroke-width="1.4"/><path d="M4.5 7.5l2.3 2.3 4-4.6" stroke="#1D7A5F" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      이메일 인증 완료
    </div>
  </div>

  <div class="row2">
    <div class="f"><label>비밀번호 <span class="req">*</span></label><input type="password" id="pw" placeholder="8자 이상"></div>
    <div class="f"><label>비밀번호 확인 <span class="req">*</span></label><input type="password" id="pw2" placeholder="동일하게 입력"></div>
  </div>

  <div class="f">
    <label>유형 <span class="req">*</span></label>
    <select id="utype">
      <option value="">선택해주세요</option>
      <option value="individual">개인 창작자</option>
      <option value="freelancer">프리랜서</option>
      <option value="company">기업 · 사업자</option>
    </select>
  </div>
  <div class="f">
    <label>활동 분야</label>
    <select id="ftype">
      <option value="">선택 (선택사항)</option>
      <option>영상편집 · 모션</option>
      <option>음악 · 사운드</option>
      <option>마케팅 · 기획</option>
      <option>디자인 · 일러스트</option>
      <option>AI 창작물</option>
      <option>아이디어 · 발명</option>
      <option>글쓰기 · 카피라이팅</option>
      <option>기타</option>
    </select>
  </div>

  <div class="agree-box">
    <div class="a-row all-row" id="rowAll">
      <input type="checkbox" id="cAll">
      <span>전체 동의</span>
    </div>
    <div class="a-row" id="rowC1"><input type="checkbox" id="c1"><span><span class="br">필수</span>이용약관 동의</span></div>
    <div class="a-row" id="rowC2"><input type="checkbox" id="c2"><span><span class="br">필수</span>개인정보 수집·이용 동의</span></div>
    <div class="a-row" id="rowC3"><input type="checkbox" id="c3"><span><span class="br">필수</span>AI 창작물 보호 정책 동의</span></div>
    <div class="a-row" id="rowC4"><input type="checkbox" id="c4"><span><span class="bo">선택</span>마케팅 수신 동의</span></div>
  </div>

  <button id="btnGo">가입하기</button>
  <div class="foot">이미 계정이 있으신가요? <a href="login.html">로그인</a></div>
</div>
</div>

<script>
var _code = '';
var _verified = false;
var _timerID = null;

/* ── 메시지 ── */
function showMsg(txt, type) {
  var el = document.getElementById('msg');
  el.textContent = txt;
  if (type === 'err') {
    el.style.cssText = 'display:block;background:#FEF2F2;border:1px solid #FECACA;color:#B91C1C;padding:11px 14px;border-radius:4px;font-size:13px;margin-bottom:16px;line-height:1.65';
  } else if (type === 'ok') {
    el.style.cssText = 'display:block;background:#E4F0EC;border:1px solid #6EE7B7;color:#1D7A5F;padding:11px 14px;border-radius:4px;font-size:13px;margin-bottom:16px;line-height:1.65';
  } else {
    el.style.cssText = 'display:block;background:#EFF6FF;border:1px solid #BFDBFE;color:#1D4ED8;padding:11px 14px;border-radius:4px;font-size:13px;margin-bottom:16px;line-height:1.65';
  }
}

/* ── 인증코드 발송 버튼 ── */
document.getElementById('btnSend').addEventListener('click', function() {
  var email = document.getElementById('email').value.trim();
  if (!email || email.indexOf('@') < 0) {
    showMsg('올바른 이메일 주소를 입력해주세요.', 'err');
    return;
  }

  /* 8자리 코드 생성 */
  _code = String(Math.floor(10000000 + Math.random() * 90000000));

  /* 이메일 입력 비활성화 */
  document.getElementById('email').disabled = true;
  document.getElementById('btnSend').textContent = '발송완료 ✓';
  document.getElementById('btnSend').style.background = '#E4F0EC';
  document.getElementById('btnSend').style.color = '#1D7A5F';
  document.getElementById('btnSend').style.borderColor = '#6EE7B7';

  /* 코드 박스 표시 */
  document.getElementById('codeBox').style.display = 'block';
  document.getElementById('codeIn').focus();

  /* 5분 타이머 시작 */
  startTimer(300);

  showMsg('인증코드를 발송했습니다. (테스트 코드: ' + _code + ')', 'info');
});

/* ── 타이머 ── */
function startTimer(sec) {
  clearInterval(_timerID);
  var remain = sec;
  var el = document.getElementById('timerText');

  function tick() {
    var m = String(Math.floor(remain / 60)).padStart(2, '0');
    var s = String(remain % 60).padStart(2, '0');
    el.textContent = '⏱ 남은 시간 ' + m + ':' + s;
    if (remain <= 0) {
      clearInterval(_timerID);
      el.textContent = '⚠ 시간이 만료됐습니다. 다시 발송해주세요.';
      el.style.color = '#8A8880';
      _code = '';
      document.getElementById('email').disabled = false;
      document.getElementById('btnSend').textContent = '재발송';
      document.getElementById('btnSend').style.cssText = 'height:44px;padding:0 14px;flex-shrink:0;white-space:nowrap;font-family:inherit;font-size:12px;border-radius:4px;background:#1A1A1A;color:white;border:1px solid #1A1A1A;cursor:pointer;';
    }
    remain--;
  }
  tick();
  _timerID = setInterval(tick, 1000);
}

/* ── 코드 확인 ── */
document.getElementById('btnCheck').addEventListener('click', function() {
  var input = document.getElementById('codeIn').value.trim();
  if (!input) { showMsg('인증코드를 입력해주세요.', 'err'); return; }
  if (!_code) { showMsg('인증 시간이 만료됐습니다. 재발송해주세요.', 'err'); return; }
  if (input !== _code) { showMsg('인증코드가 일치하지 않습니다. 다시 확인해주세요.', 'err'); return; }

  clearInterval(_timerID);
  _verified = true;
  document.getElementById('codeBox').style.display = 'none';
  document.getElementById('btnSend').style.display = 'none';
  document.getElementById('verifiedBadge').style.display = 'flex';
  showMsg('이메일 인증이 완료됐습니다.', 'ok');
});

/* ── 전체동의 ── */
document.getElementById('rowAll').addEventListener('click', function() {
  var newVal = !document.getElementById('cAll').checked;
  document.getElementById('cAll').checked = newVal;
  document.getElementById('c1').checked = newVal;
  document.getElementById('c2').checked = newVal;
  document.getElementById('c3').checked = newVal;
  document.getElementById('c4').checked = newVal;
});

function bindRow(rowId, chkId) {
  document.getElementById(rowId).addEventListener('click', function() {
    var el = document.getElementById(chkId);
    el.checked = !el.checked;
    var all = document.getElementById('c1').checked &&
              document.getElementById('c2').checked &&
              document.getElementById('c3').checked &&
              document.getElementById('c4').checked;
    document.getElementById('cAll').checked = all;
  });
}
bindRow('rowC1','c1');
bindRow('rowC2','c2');
bindRow('rowC3','c3');
bindRow('rowC4','c4');

/* ── 가입하기 ── */
document.getElementById('btnGo').addEventListener('click', function() {
  var name  = document.getElementById('name').value.trim();
  var email = document.getElementById('email').value.trim();
  var pw    = document.getElementById('pw').value;
  var pw2   = document.getElementById('pw2').value;
  var utype = document.getElementById('utype').value;

  if (!name)       { showMsg('이름(활동명)을 입력해주세요.', 'err'); return; }
  if (!email)      { showMsg('이메일을 입력해주세요.', 'err'); return; }
  if (!_verified)  { showMsg('이메일 인증을 먼저 완료해주세요.', 'err'); return; }
  if (pw.length < 8){ showMsg('비밀번호는 8자 이상이어야 합니다.', 'err'); return; }
  if (pw !== pw2)  { showMsg('비밀번호가 일치하지 않습니다.', 'err'); return; }
  if (!utype)      { showMsg('유형을 선택해주세요.', 'err'); return; }
  if (!document.getElementById('c1').checked ||
      !document.getElementById('c2').checked ||
      !document.getElementById('c3').checked) {
    showMsg('필수 약관에 모두 동의해주세요.', 'err'); return;
  }

  showMsg('가입이 완료됐습니다! 로그인 페이지로 이동합니다.', 'ok');
  document.getElementById('btnGo').textContent = '가입 완료 ✓';
  document.getElementById('btnGo').disabled = true;
  setTimeout(function() { window.location.href = 'login.html'; }, 2000);
});
</script>
</body>
</html>
