<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회원가입 · Ideabl</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #1A1A1A; --ink-mid: #555552; --ink-light: #8A8880;
  --paper: #FAFAF8; --paper-2: #F3F1EB; --rule: #E0DDD5; --rule-dark: #C8C5BC;
  --green: #1D7A5F; --green-lt: #E4F0EC; --red: #B91C1C; --red-lt: #FEF2F2;
  --serif: 'Noto Serif KR', serif; --sans: 'Noto Sans KR', sans-serif;
}
body { font-family: var(--sans); background: var(--paper); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; }
nav { border-bottom: 1px solid var(--rule); padding: 0 48px; height: 60px; display: flex; align-items: center; }
.nav-logo { font-family: var(--serif); font-weight: 700; font-size: 17px; color: var(--ink); text-decoration: none; }
.nav-logo span { color: var(--ink-light); font-weight: 300; font-size: 14px; }
.page-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 60px 24px; }
.card { width: 100%; max-width: 460px; background: white; border: 1px solid var(--rule); border-radius: 8px; padding: 48px 44px; }
.card-eyebrow { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.card-eyebrow-line { width: 20px; height: 1px; background: var(--ink-light); }
.card-eyebrow span { font-size: 10px; color: var(--ink-light); letter-spacing: 0.2em; }
.card-title { font-family: var(--serif); font-weight: 700; font-size: 26px; color: var(--ink); letter-spacing: -0.02em; margin-bottom: 28px; }
.field { margin-bottom: 18px; }
.field label { display: block; font-size: 12px; color: var(--ink-mid); letter-spacing: 0.06em; margin-bottom: 7px; }
.field label .req { color: var(--red); margin-left: 2px; }
.field input, .field select {
  width: 100%; height: 44px; padding: 0 14px;
  border: 1px solid var(--rule-dark); border-radius: 4px;
  font-family: var(--sans); font-size: 14px; color: var(--ink);
  background: var(--paper); outline: none; transition: border-color 0.2s;
  appearance: none;
}
.field input:focus, .field select:focus { border-color: var(--ink); }
.field input::placeholder { color: var(--ink-light); }
.field input:disabled { background: var(--paper-2); color: var(--ink-light); cursor: not-allowed; }
.field-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px; }
.field-row-2 .field { margin-bottom: 0; }

/* 이메일 인증 */
.email-row { display: flex; gap: 8px; }
.email-row input { flex: 1; }
.btn-verify { height: 44px; padding: 0 16px; background: var(--paper-2); color: var(--ink-mid); border: 1px solid var(--rule-dark); border-radius: 4px; font-family: var(--sans); font-size: 12px; letter-spacing: 0.04em; cursor: pointer; white-space: nowrap; transition: all 0.2s; flex-shrink: 0; }
.btn-verify:hover { border-color: var(--ink); color: var(--ink); }
.btn-verify:disabled { background: var(--paper-2); color: var(--ink-light); cursor: not-allowed; }
.code-row { display: flex; gap: 8px; margin-top: 8px; }
.code-row input { flex: 1; letter-spacing: 0.2em; font-size: 16px; text-align: center; }
.btn-code-confirm { height: 44px; padding: 0 16px; background: var(--ink); color: white; border: none; border-radius: 4px; font-family: var(--sans); font-size: 12px; cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: background 0.2s; }
.btn-code-confirm:hover { background: #333; }
.verified-badge { display: none; align-items: center; gap: 6px; font-size: 12px; color: var(--green); margin-top: 6px; }
.verified-badge.show { display: flex; }

/* 약관 */
.agree-box { background: var(--paper-2); border: 1px solid var(--rule); border-radius: 4px; padding: 14px 16px; margin-bottom: 20px; }
.agree-all-row { display: flex; align-items: center; gap: 8px; padding-bottom: 10px; margin-bottom: 10px; border-bottom: 1px solid var(--rule); cursor: pointer; }
.agree-all-row span { font-size: 13px; font-weight: 500; color: var(--ink); }
.agree-item { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; cursor: pointer; }
.agree-item:last-child { margin-bottom: 0; }
.agree-item span { font-size: 13px; color: var(--ink-mid); }
input[type="checkbox"] { width: 16px; height: 16px; flex-shrink: 0; accent-color: var(--ink); cursor: pointer; }
.req-badge { font-size: 10px; color: var(--red); background: var(--red-lt); padding: 1px 5px; border-radius: 2px; margin-right: 4px; }
.opt-badge { font-size: 10px; color: var(--ink-light); background: white; border: 1px solid var(--rule); padding: 1px 5px; border-radius: 2px; margin-right: 4px; }

.btn-submit { width: 100%; height: 48px; background: var(--ink); color: var(--paper); border: none; border-radius: 4px; font-family: var(--sans); font-size: 14px; letter-spacing: 0.06em; cursor: pointer; transition: background 0.2s; }
.btn-submit:hover { background: #333; }
.btn-submit:disabled { background: var(--rule-dark); cursor: not-allowed; }
.msg { padding: 10px 14px; border-radius: 4px; font-size: 13px; margin-bottom: 16px; display: none; line-height: 1.6; }
.msg.error { background: var(--red-lt); border: 1px solid #FECACA; color: var(--red); display: block; }
.msg.success { background: var(--green-lt); border: 1px solid #6EE7B7; color: var(--green); display: block; }
.msg.info { background: #EFF6FF; border: 1px solid #BFDBFE; color: #1D4ED8; display: block; }
.card-footer { text-align: center; margin-top: 20px; padding-top: 18px; border-top: 1px solid var(--rule); font-size: 13px; color: var(--ink-light); }
.card-footer a { color: var(--ink); font-weight: 500; text-decoration: none; }
.timer { font-size: 11px; color: var(--red); margin-top: 4px; display: none; }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">Ideabl <span>· 아이디어블</span></a>
</nav>
<div class="page-wrap">
  <div class="card">
    <div class="card-eyebrow">
      <div class="card-eyebrow-line"></div>
      <span>SIGN UP</span>
    </div>
    <div class="card-title">회원가입</div>

    <div class="msg" id="msg"></div>

    <div class="field">
      <label>이름 (활동명) <span class="req">*</span></label>
      <input type="text" id="name" placeholder="실명 또는 활동명">
    </div>

    <!-- 이메일 + 인증 -->
    <div class="field">
      <label>이메일 <span class="req">*</span></label>
      <div class="email-row">
        <input type="email" id="email" placeholder="example@email.com" autocomplete="email">
        <button class="btn-verify" id="btn-send-code" onclick="sendCode()">인증코드 발송</button>
      </div>
      <div class="code-row" id="code-row" style="display:none;">
        <input type="text" id="code-input" placeholder="인증코드 6자리 입력" maxlength="6">
        <button class="btn-code-confirm" onclick="verifyCode()">확인</button>
      </div>
      <div class="timer" id="timer"></div>
      <div class="verified-badge" id="verified-badge">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" stroke="#1D7A5F" stroke-width="1.2"/><path d="M4 7l2.2 2.2 3.8-4.4" stroke="#1D7A5F" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        이메일 인증 완료
      </div>
    </div>

    <div class="field-row-2">
      <div class="field">
        <label>비밀번호 <span class="req">*</span></label>
        <input type="password" id="pw" placeholder="8자 이상" autocomplete="new-password">
      </div>
      <div class="field">
        <label>비밀번호 확인 <span class="req">*</span></label>
        <input type="password" id="pw2" placeholder="동일하게 입력" autocomplete="new-password">
      </div>
    </div>

    <div class="field">
      <label>유형 <span class="req">*</span></label>
      <select id="user-type">
        <option value="">선택해주세요</option>
        <option value="individual">개인 창작자</option>
        <option value="freelancer">프리랜서</option>
        <option value="company">기업 · 사업자</option>
      </select>
    </div>
    <div class="field">
      <label>활동 분야</label>
      <select id="field-type">
        <option value="">선택 (선택사항)</option>
        <option>영상편집 · 모션</option>
        <option>음악 · 사운드</option>
        <option>마케팅 · 기획</option>
        <option>디자인 · 일러스트</option>
        <option>AI 창작물</option>
        <option>아이디어 · 발명</option>
        <option>글쓰기 · 카피라이팅</option>
        <option>기타</option>
      </select>
    </div>

    <div class="agree-box">
      <div class="agree-all-row" onclick="toggleAll()">
        <input type="checkbox" id="agree-all" onclick="event.stopPropagation(); toggleAll()">
        <span>전체 동의</span>
      </div>
      <div class="agree-item" onclick="toggleOne('agree-1')">
        <input type="checkbox" id="agree-1" onclick="event.stopPropagation(); toggleOne('agree-1'); syncAll()">
        <span><span class="req-badge">필수</span>이용약관 동의</span>
      </div>
      <div class="agree-item" onclick="toggleOne('agree-2')">
        <input type="checkbox" id="agree-2" onclick="event.stopPropagation(); toggleOne('agree-2'); syncAll()">
        <span><span class="req-badge">필수</span>개인정보 수집·이용 동의</span>
      </div>
      <div class="agree-item" onclick="toggleOne('agree-3')">
        <input type="checkbox" id="agree-3" onclick="event.stopPropagation(); toggleOne('agree-3'); syncAll()">
        <span><span class="req-badge">필수</span>AI 창작물 보호 정책 동의</span>
      </div>
      <div class="agree-item" onclick="toggleOne('agree-4')">
        <input type="checkbox" id="agree-4" onclick="event.stopPropagation(); toggleOne('agree-4'); syncAll()">
        <span><span class="opt-badge">선택</span>마케팅 수신 동의</span>
      </div>
    </div>

    <button class="btn-submit" id="btn-submit" onclick="handleSignup()">가입하기</button>

    <div class="card-footer">
      이미 계정이 있으신가요? <a href="login.html">로그인</a>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://tavdxdgubabokhklpeme.supabase.co';
const SUPABASE_KEY = 'sb_publishable_g2jvs3vYubeC7vI5W9gs1g_BUabVfhX';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let emailVerified = false;
let generatedCode = '';
let timerInterval = null;

/* ── 전체동의 ── */
function toggleAll() {
  const allBox = document.getElementById('agree-all');
  allBox.checked = !allBox.checked;
  const val = allBox.checked;
  ['agree-1','agree-2','agree-3','agree-4'].forEach(id => {
    document.getElementById(id).checked = val;
  });
}
function toggleOne(id) {
  document.getElementById(id).checked = !document.getElementById(id).checked;
  syncAll();
}
function syncAll() {
  const checks = ['agree-1','agree-2','agree-3','agree-4'];
  document.getElementById('agree-all').checked = checks.every(id => document.getElementById(id).checked);
}

/* ── 메시지 ── */
function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
}
function hideMsg() {
  document.getElementById('msg').className = 'msg';
}

/* ── 이메일 인증코드 발송 ── */
function generateCode() {
  return Math.floor(100000 + Math.random() * 900000).toString();
}

function startTimer(seconds) {
  const timerEl = document.getElementById('timer');
  timerEl.style.display = 'block';
  clearInterval(timerInterval);
  let remain = seconds;
  timerEl.textContent = '남은 시간: ' + remain + '초';
  timerInterval = setInterval(() => {
    remain--;
    timerEl.textContent = '남은 시간: ' + remain + '초';
    if (remain <= 0) {
      clearInterval(timerInterval);
      timerEl.textContent = '인증 시간이 만료됐습니다. 다시 발송해주세요.';
      generatedCode = '';
    }
  }, 1000);
}

async function sendCode() {
  const email = document.getElementById('email').value.trim();
  if (!email || !email.includes('@')) { showMsg('유효한 이메일을 입력해주세요.', 'error'); return; }

  const btn = document.getElementById('btn-send-code');
  btn.disabled = true;
  btn.textContent = '발송 중...';

  generatedCode = generateCode();

  const { error } = await supabase.functions.invoke('send-code', {
    body: { email, code: generatedCode }
  }).catch(() => ({ error: { message: 'function_not_found' } }));

  if (error && error.message !== 'function_not_found') {
    showMsg('인증코드 발송에 실패했습니다. 다시 시도해주세요.', 'error');
    btn.disabled = false;
    btn.textContent = '인증코드 발송';
    return;
  }

  document.getElementById('code-row').style.display = 'flex';
  document.getElementById('email').disabled = true;
  btn.textContent = '재발송';
  btn.disabled = false;
  startTimer(180);

  const devMsg = `인증코드가 발송됐습니다. (개발 테스트 중: ${generatedCode})`;
  showMsg(devMsg, 'info');
}

function verifyCode() {
  const input = document.getElementById('code-input').value.trim();
  if (!input) { showMsg('인증코드를 입력해주세요.', 'error'); return; }
  if (input !== generatedCode) { showMsg('인증코드가 올바르지 않습니다.', 'error'); return; }

  clearInterval(timerInterval);
  document.getElementById('timer').style.display = 'none';
  document.getElementById('code-row').style.display = 'none';
  document.getElementById('verified-badge').classList.add('show');
  document.getElementById('btn-send-code').disabled = true;
  document.getElementById('btn-send-code').textContent = '인증완료';
  emailVerified = true;
  hideMsg();
  showMsg('이메일 인증이 완료됐습니다.', 'success');
}

/* ── 가입하기 ── */
async function handleSignup() {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const pw = document.getElementById('pw').value;
  const pw2 = document.getElementById('pw2').value;
  const userType = document.getElementById('user-type').value;
  const fieldType = document.getElementById('field-type').value;

  if (!name) { showMsg('이름(활동명)을 입력해주세요.', 'error'); return; }
  if (!email) { showMsg('이메일을 입력해주세요.', 'error'); return; }
  if (!emailVerified) { showMsg('이메일 인증을 완료해주세요.', 'error'); return; }
  if (!pw) { showMsg('비밀번호를 입력해주세요.', 'error'); return; }
  if (pw.length < 8) { showMsg('비밀번호는 8자 이상이어야 합니다.', 'error'); return; }
  if (pw !== pw2) { showMsg('비밀번호가 일치하지 않습니다.', 'error'); return; }
  if (!userType) { showMsg('유형을 선택해주세요.', 'error'); return; }
  if (!document.getElementById('agree-1').checked ||
      !document.getElementById('agree-2').checked ||
      !document.getElementById('agree-3').checked) {
    showMsg('필수 약관에 모두 동의해주세요.', 'error'); return;
  }

  const btn = document.getElementById('btn-submit');
  btn.textContent = '가입 중...';
  btn.disabled = true;

  const { data, error } = await supabase.auth.signUp({
    email,
    password: pw,
    options: {
      data: { name, user_type: userType, field_type: fieldType },
      emailRedirectTo: 'https://ideabl.com/login.html'
    }
  });

  if (error) {
    let msg = '가입 중 오류가 발생했습니다: ' + error.message;
    if (error.message.includes('already registered') || error.message.includes('already been registered')) {
      msg = '이미 가입된 이메일입니다. 로그인해주세요.';
    }
    if (error.message.includes('password')) msg = '비밀번호는 8자 이상이어야 합니다.';
    showMsg(msg, 'error');
    btn.textContent = '가입하기';
    btn.disabled = false;
    return;
  }

  showMsg('가입이 완료됐습니다! 입력하신 이메일로 인증 메일을 발송했습니다. 메일 인증 후 로그인해주세요.', 'success');
  btn.textContent = '가입 완료';
  setTimeout(() => { window.location.href = 'login.html'; }, 3000);
}
</script>
</body>
</html>
