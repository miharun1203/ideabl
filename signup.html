<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회원가입 · Ideabl</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #1A1A1A; --ink-mid: #555552; --ink-light: #8A8880;
  --paper: #FAFAF8; --paper-2: #F3F1EB; --rule: #E0DDD5; --rule-dark: #C8C5BC;
  --green: #1D7A5F; --green-lt: #E4F0EC; --red: #B91C1C; --red-lt: #FEF2F2;
  --serif: 'Noto Serif KR', serif; --sans: 'Noto Sans KR', sans-serif;
}
body { font-family: var(--sans); background: var(--paper); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; }
nav { border-bottom: 1px solid var(--rule); padding: 0 48px; height: 60px; display: flex; align-items: center; }
.nav-logo { font-family: var(--serif); font-weight: 700; font-size: 17px; color: var(--ink); text-decoration: none; }
.nav-logo span { color: var(--ink-light); font-weight: 300; font-size: 14px; }
.page-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 60px 24px; }
.card { width: 100%; max-width: 460px; background: white; border: 1px solid var(--rule); border-radius: 8px; padding: 48px 44px; }
.card-eyebrow { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.card-eyebrow-line { width: 20px; height: 1px; background: var(--ink-light); }
.card-eyebrow span { font-size: 10px; color: var(--ink-light); letter-spacing: 0.2em; }
.card-title { font-family: var(--serif); font-weight: 700; font-size: 26px; color: var(--ink); letter-spacing: -0.02em; margin-bottom: 28px; }
.field { margin-bottom: 18px; }
.field label { display: block; font-size: 12px; color: var(--ink-mid); letter-spacing: 0.06em; margin-bottom: 7px; }
.field label .req { color: var(--red); margin-left: 2px; }
.field input, .field select {
  width: 100%; height: 44px; padding: 0 14px;
  border: 1px solid var(--rule-dark); border-radius: 4px;
  font-family: var(--sans); font-size: 14px; color: var(--ink);
  background: var(--paper); outline: none; transition: border-color 0.2s;
  appearance: none;
}
.field input:focus, .field select:focus { border-color: var(--ink); }
.field input::placeholder { color: var(--ink-light); }
.field input:disabled { background: var(--paper-2); color: var(--ink-light); cursor: not-allowed; }
.field-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px; }
.field-row-2 .field { margin-bottom: 0; }
.email-row { display: flex; gap: 8px; }
.email-row input { flex: 1; }
.btn-send { height: 44px; padding: 0 14px; background: var(--paper-2); color: var(--ink-mid); border: 1px solid var(--rule-dark); border-radius: 4px; font-family: var(--sans); font-size: 12px; cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: all 0.2s; }
.btn-send:hover { border-color: var(--ink); color: var(--ink); }
.btn-send:disabled { opacity: 0.5; cursor: not-allowed; }
.code-wrap { margin-top: 8px; display: none; }
.code-row { display: flex; gap: 8px; }
.code-row input { flex: 1; letter-spacing: 0.25em; font-size: 18px; text-align: center; font-weight: 600; }
.btn-code-ok { height: 44px; padding: 0 16px; background: var(--ink); color: white; border: none; border-radius: 4px; font-family: var(--sans); font-size: 12px; cursor: pointer; flex-shrink: 0; }
.btn-code-ok:hover { background: #333; }
.timer { font-size: 11px; color: var(--red); margin-top: 5px; }
.verified-row { display: none; align-items: center; gap: 6px; font-size: 12px; color: var(--green); margin-top: 6px; }
.verified-row.show { display: flex; }

/* 약관 */
.agree-box { border: 1px solid var(--rule); border-radius: 6px; overflow: hidden; margin-bottom: 20px; }
.agree-all-row {
  display: flex; align-items: center; gap: 10px;
  padding: 13px 16px; background: var(--paper-2);
  cursor: pointer; border-bottom: 1px solid var(--rule);
  user-select: none;
}
.agree-all-row span { font-size: 13px; font-weight: 500; color: var(--ink); }
.agree-item {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 16px; cursor: pointer;
  border-bottom: 1px solid var(--rule);
  user-select: none;
}
.agree-item:last-child { border-bottom: none; }
.agree-item span { font-size: 13px; color: var(--ink-mid); }
input[type="checkbox"] { width: 16px; height: 16px; flex-shrink: 0; accent-color: var(--ink); cursor: pointer; }
.req-badge { font-size: 10px; color: var(--red); background: var(--red-lt); padding: 1px 5px; border-radius: 2px; margin-right: 4px; }
.opt-badge { font-size: 10px; color: var(--ink-light); background: var(--paper-2); border: 1px solid var(--rule); padding: 1px 5px; border-radius: 2px; margin-right: 4px; }

.btn-submit { width: 100%; height: 48px; background: var(--ink); color: var(--paper); border: none; border-radius: 4px; font-family: var(--sans); font-size: 14px; letter-spacing: 0.06em; cursor: pointer; transition: background 0.2s; margin-top: 4px; }
.btn-submit:hover { background: #333; }
.btn-submit:disabled { background: var(--rule-dark); cursor: not-allowed; }
.msg { padding: 11px 14px; border-radius: 4px; font-size: 13px; margin-bottom: 16px; display: none; line-height: 1.65; }
.msg.error { background: var(--red-lt); border: 1px solid #FECACA; color: var(--red); display: block; }
.msg.success { background: var(--green-lt); border: 1px solid #6EE7B7; color: var(--green); display: block; }
.msg.info { background: #EFF6FF; border: 1px solid #BFDBFE; color: #1D4ED8; display: block; }
.card-footer { text-align: center; margin-top: 20px; padding-top: 18px; border-top: 1px solid var(--rule); font-size: 13px; color: var(--ink-light); }
.card-footer a { color: var(--ink); font-weight: 500; text-decoration: none; }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">Ideabl <span>· 아이디어블</span></a>
</nav>
<div class="page-wrap">
  <div class="card">
    <div class="card-eyebrow">
      <div class="card-eyebrow-line"></div>
      <span>SIGN UP</span>
    </div>
    <div class="card-title">회원가입</div>

    <div class="msg" id="msg"></div>

    <div class="field">
      <label>이름 (활동명) <span class="req">*</span></label>
      <input type="text" id="name" placeholder="실명 또는 활동명">
    </div>

    <div class="field">
      <label>이메일 <span class="req">*</span></label>
      <div class="email-row">
        <input type="email" id="email" placeholder="example@email.com" autocomplete="email">
        <button class="btn-send" id="btn-send" onclick="sendCode()">인증코드 발송</button>
      </div>
      <div class="code-wrap" id="code-wrap">
        <div class="code-row">
          <input type="text" id="code-input" placeholder="8자리 입력" maxlength="8" inputmode="numeric">
          <button class="btn-code-ok" onclick="verifyCode()">확인</button>
        </div>
        <div class="timer" id="timer"></div>
      </div>
      <div class="verified-row" id="verified-row">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" stroke="#1D7A5F" stroke-width="1.2"/><path d="M4 7l2.2 2.2 3.8-4.4" stroke="#1D7A5F" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        이메일 인증 완료
      </div>
    </div>

    <div class="field-row-2">
      <div class="field">
        <label>비밀번호 <span class="req">*</span></label>
        <input type="password" id="pw" placeholder="8자 이상" autocomplete="new-password">
      </div>
      <div class="field">
        <label>비밀번호 확인 <span class="req">*</span></label>
        <input type="password" id="pw2" placeholder="동일하게 입력" autocomplete="new-password">
      </div>
    </div>

    <div class="field">
      <label>유형 <span class="req">*</span></label>
      <select id="user-type">
        <option value="">선택해주세요</option>
        <option value="individual">개인 창작자</option>
        <option value="freelancer">프리랜서</option>
        <option value="company">기업 · 사업자</option>
      </select>
    </div>
    <div class="field">
      <label>활동 분야</label>
      <select id="field-type">
        <option value="">선택 (선택사항)</option>
        <option>영상편집 · 모션</option>
        <option>음악 · 사운드</option>
        <option>마케팅 · 기획</option>
        <option>디자인 · 일러스트</option>
        <option>AI 창작물</option>
        <option>아이디어 · 발명</option>
        <option>글쓰기 · 카피라이팅</option>
        <option>기타</option>
      </select>
    </div>

    <div class="agree-box">
      <div class="agree-all-row" id="row-all" onclick="toggleAll()">
        <input type="checkbox" id="agree-all">
        <span>전체 동의</span>
      </div>
      <div class="agree-item" onclick="toggleOne('c1')">
        <input type="checkbox" id="c1">
        <span><span class="req-badge">필수</span>이용약관 동의</span>
      </div>
      <div class="agree-item" onclick="toggleOne('c2')">
        <input type="checkbox" id="c2">
        <span><span class="req-badge">필수</span>개인정보 수집·이용 동의</span>
      </div>
      <div class="agree-item" onclick="toggleOne('c3')">
        <input type="checkbox" id="c3">
        <span><span class="req-badge">필수</span>AI 창작물 보호 정책 동의</span>
      </div>
      <div class="agree-item" onclick="toggleOne('c4')">
        <input type="checkbox" id="c4">
        <span><span class="opt-badge">선택</span>마케팅 수신 동의</span>
      </div>
    </div>

    <button class="btn-submit" id="btn-submit" onclick="handleSignup()">가입하기</button>

    <div class="card-footer">
      이미 계정이 있으신가요? <a href="login.html">로그인</a>
    </div>
  </div>
</div>

<script>
// ── 초기화 ──
emailjs.init('KUNFHIKD0ps5p7GOG');
const SUPABASE_URL = 'https://tavdxdgubabokhklpeme.supabase.co';
const SUPABASE_KEY = 'sb_publishable_g2jvs3vYubeC7vI5W9gs1g_BUabVfhX';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let verifiedEmail = false;
let currentCode = '';
let timerInterval = null;

// ── 메시지 ──
function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ── 전체동의 ──
function toggleAll() {
  const allChk = document.getElementById('agree-all');
  const newVal = !allChk.checked;
  allChk.checked = newVal;
  ['c1','c2','c3','c4'].forEach(id => {
    document.getElementById(id).checked = newVal;
  });
}
function toggleOne(id) {
  const chk = document.getElementById(id);
  chk.checked = !chk.checked;
  const all = ['c1','c2','c3','c4'].every(i => document.getElementById(i).checked);
  document.getElementById('agree-all').checked = all;
}

// ── 타이머 ──
function startTimer(sec) {
  clearInterval(timerInterval);
  const el = document.getElementById('timer');
  let remain = sec;
  el.textContent = '남은 시간: ' + remain + '초';
  timerInterval = setInterval(() => {
    remain--;
    el.textContent = '남은 시간: ' + remain + '초';
    if (remain <= 0) {
      clearInterval(timerInterval);
      el.textContent = '인증 시간이 만료됐습니다. 다시 발송해주세요.';
      currentCode = '';
    }
  }, 1000);
}

// ── 인증코드 발송 ──
async function sendCode() {
  const email = document.getElementById('email').value.trim();
  if (!email || !email.includes('@')) {
    showMsg('유효한 이메일을 입력해주세요.', 'error'); return;
  }

  const btn = document.getElementById('btn-send');
  btn.disabled = true;
  btn.textContent = '발송 중...';

  // 8자리 숫자 코드 생성
  currentCode = String(Math.floor(10000000 + Math.random() * 90000000));

  try {
    await emailjs.send('service_ia9l1am', 'template_jg8zzgb', {
      email: email,
      passcode: currentCode
    });

    document.getElementById('code-wrap').style.display = 'block';
    document.getElementById('email').disabled = true;
    btn.textContent = '재발송';
    btn.disabled = false;
    startTimer(180);
    showMsg('인증코드 8자리를 입력하신 이메일로 발송했습니다.', 'info');

  } catch (err) {
    showMsg('이메일 발송에 실패했습니다. 이메일 주소를 확인해주세요.', 'error');
    btn.textContent = '인증코드 발송';
    btn.disabled = false;
    console.error(err);
  }
}

// ── 코드 확인 ──
function verifyCode() {
  const input = document.getElementById('code-input').value.trim();
  if (!input) { showMsg('인증코드를 입력해주세요.', 'error'); return; }
  if (!currentCode) { showMsg('인증 시간이 만료됐습니다. 다시 발송해주세요.', 'error'); return; }
  if (input !== currentCode) { showMsg('인증코드가 올바르지 않습니다. 다시 확인해주세요.', 'error'); return; }

  clearInterval(timerInterval);
  verifiedEmail = true;
  document.getElementById('code-wrap').style.display = 'none';
  document.getElementById('verified-row').classList.add('show');
  document.getElementById('btn-send').disabled = true;
  document.getElementById('btn-send').textContent = '인증완료';
  showMsg('이메일 인증이 완료됐습니다.', 'success');
}

// ── 가입하기 ──
async function handleSignup() {
  const name     = document.getElementById('name').value.trim();
  const email    = document.getElementById('email').value.trim();
  const pw       = document.getElementById('pw').value;
  const pw2      = document.getElementById('pw2').value;
  const userType = document.getElementById('user-type').value;
  const fieldType= document.getElementById('field-type').value;

  if (!name)          { showMsg('이름(활동명)을 입력해주세요.', 'error'); return; }
  if (!email)         { showMsg('이메일을 입력해주세요.', 'error'); return; }
  if (!verifiedEmail) { showMsg('이메일 인증을 먼저 완료해주세요.', 'error'); return; }
  if (!pw)            { showMsg('비밀번호를 입력해주세요.', 'error'); return; }
  if (pw.length < 8)  { showMsg('비밀번호는 8자 이상이어야 합니다.', 'error'); return; }
  if (pw !== pw2)     { showMsg('비밀번호가 일치하지 않습니다.', 'error'); return; }
  if (!userType)      { showMsg('유형을 선택해주세요.', 'error'); return; }
  if (!document.getElementById('c1').checked ||
      !document.getElementById('c2').checked ||
      !document.getElementById('c3').checked) {
    showMsg('필수 약관에 모두 동의해주세요.', 'error'); return;
  }

  const btn = document.getElementById('btn-submit');
  btn.textContent = '가입 중...';
  btn.disabled = true;

  const { data, error } = await supabase.auth.signUp({
    email, password: pw,
    options: {
      data: { name, user_type: userType, field_type: fieldType },
      emailRedirectTo: 'https://ideabl.com/login.html'
    }
  });

  if (error) {
    let msg = '가입 중 오류가 발생했습니다.';
    if (error.message.includes('already registered') || error.message.includes('already been registered')) {
      msg = '이미 가입된 이메일입니다. 로그인해주세요.';
    }
    if (error.message.includes('password')) msg = '비밀번호는 8자 이상이어야 합니다.';
    showMsg(msg, 'error');
    btn.textContent = '가입하기';
    btn.disabled = false;
    return;
  }

  showMsg('가입이 완료됐습니다! 로그인 페이지로 이동합니다.', 'success');
  btn.textContent = '가입 완료 ✓';
  setTimeout(() => { window.location.href = 'login.html'; }, 2500);
}
</script>
</body>
</html>
