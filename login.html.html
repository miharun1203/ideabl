<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 · Ideabl</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #1A1A1A; --ink-mid: #555552; --ink-light: #8A8880;
  --paper: #FAFAF8; --paper-2: #F3F1EB; --rule: #E0DDD5; --rule-dark: #C8C5BC;
  --green: #1D7A5F; --green-lt: #E4F0EC;
  --serif: 'Noto Serif KR', serif; --sans: 'Noto Sans KR', sans-serif;
}
body { font-family: var(--sans); background: var(--paper); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; }

nav {
  border-bottom: 1px solid var(--rule); padding: 0 48px; height: 60px;
  display: flex; align-items: center; justify-content: space-between;
}
.nav-logo { font-family: var(--serif); font-weight: 700; font-size: 17px; color: var(--ink); text-decoration: none; }
.nav-logo span { color: var(--ink-light); font-weight: 300; font-size: 14px; }

.page-wrap {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 60px 24px;
}
.card {
  width: 100%; max-width: 420px;
  background: white; border: 1px solid var(--rule);
  border-radius: 8px; padding: 48px 40px;
}
.card-eyebrow {
  display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
}
.card-eyebrow-line { width: 20px; height: 1px; background: var(--ink-light); }
.card-eyebrow span { font-size: 10px; color: var(--ink-light); letter-spacing: 0.2em; }
.card-title {
  font-family: var(--serif); font-weight: 700; font-size: 26px;
  color: var(--ink); letter-spacing: -0.02em; margin-bottom: 32px;
}
.field { margin-bottom: 20px; }
.field label {
  display: block; font-size: 12px; color: var(--ink-mid);
  letter-spacing: 0.06em; margin-bottom: 8px;
}
.field input {
  width: 100%; height: 44px; padding: 0 14px;
  border: 1px solid var(--rule-dark); border-radius: 4px;
  font-family: var(--sans); font-size: 14px; color: var(--ink);
  background: var(--paper); outline: none; transition: border-color 0.2s;
}
.field input:focus { border-color: var(--ink); }
.field input::placeholder { color: var(--ink-light); }
.field-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.field-row label { margin-bottom: 0; font-size: 12px; color: var(--ink-mid); letter-spacing: 0.06em; }
.field-link { font-size: 12px; color: var(--ink-light); text-decoration: none; }
.field-link:hover { color: var(--ink); }
.btn-submit {
  width: 100%; height: 48px; background: var(--ink); color: var(--paper);
  border: none; border-radius: 4px; font-family: var(--sans);
  font-size: 14px; letter-spacing: 0.06em; cursor: pointer;
  margin-top: 8px; transition: background 0.2s;
}
.btn-submit:hover { background: #333; }
.divider {
  display: flex; align-items: center; gap: 12px; margin: 24px 0;
}
.divider-line { flex: 1; height: 1px; background: var(--rule); }
.divider span { font-size: 11px; color: var(--ink-light); letter-spacing: 0.1em; }
.social-btn {
  width: 100%; height: 44px; background: white;
  border: 1px solid var(--rule-dark); border-radius: 4px;
  font-family: var(--sans); font-size: 13px; color: var(--ink-mid);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  gap: 10px; margin-bottom: 10px; transition: border-color 0.2s;
  text-decoration: none;
}
.social-btn:hover { border-color: var(--ink); color: var(--ink); }
.card-footer { text-align: center; margin-top: 28px; padding-top: 24px; border-top: 1px solid var(--rule); }
.card-footer span { font-size: 13px; color: var(--ink-light); }
.card-footer a { font-size: 13px; color: var(--ink); text-decoration: none; font-weight: 500; }
.card-footer a:hover { text-decoration: underline; }
.error-msg {
  display: none; background: #FEF2F2; border: 1px solid #FECACA;
  border-radius: 4px; padding: 10px 14px; margin-bottom: 16px;
  font-size: 13px; color: #B91C1C;
}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">Ideabl <span>· 아이디어블</span></a>
</nav>
<div class="page-wrap">
  <div class="card">
    <div class="card-eyebrow">
      <div class="card-eyebrow-line"></div>
      <span>SIGN IN</span>
    </div>
    <div class="card-title">로그인</div>
    <div class="error-msg" id="error-msg">이메일 또는 비밀번호를 확인해주세요.</div>
    <div class="field">
      <label>이메일</label>
      <input type="email" id="email" placeholder="example@email.com" autocomplete="email">
    </div>
    <div class="field">
      <div class="field-row">
        <label>비밀번호</label>
        <a href="#" class="field-link">비밀번호 찾기</a>
      </div>
      <input type="password" id="password" placeholder="비밀번호 입력" autocomplete="current-password">
    </div>
    <button class="btn-submit" onclick="handleLogin()">로그인</button>
    <div class="divider">
      <div class="divider-line"></div>
      <span>또는</span>
      <div class="divider-line"></div>
    </div>
    <a href="#" class="social-btn">
      <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/><path d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.175 0 7.548 0 9s.348 2.825.957 4.039l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.166 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
      Google로 로그인
    </a>
    <a href="#" class="social-btn">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect width="18" height="18" rx="3" fill="#FEE500"/><path d="M9 3.6C6.015 3.6 3.6 5.46 3.6 7.755c0 1.44.9 2.7 2.25 3.465-.09.315-.585 2.07-.63 2.25 0 0-.015.12.06.165s.165.015.165.015c.21-.03 2.46-1.62 2.85-1.89.21.03.435.045.66.045 2.985 0 5.4-1.86 5.4-4.155S11.985 3.6 9 3.6z" fill="#391B1B"/></svg>
      카카오로 로그인
    </a>
    <div class="card-footer">
      <span>아직 계정이 없으신가요? </span>
      <a href="signup.html">회원가입</a>
    </div>
  </div>
</div>
<script>
function handleLogin() {
  const email = document.getElementById('email').value;
  const pw = document.getElementById('password').value;
  const err = document.getElementById('error-msg');
  if (!email || !pw) { err.style.display = 'block'; return; }
  err.style.display = 'none';
  alert('준비 중입니다. 베타 서비스 오픈 후 이용 가능합니다.');
}
</script>
</body>
</html>
